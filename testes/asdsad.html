<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CYBER_TERMINAL // PROTOCOL_80s</title>
    <style>
        /* DIRETRIZES VISUAIS: CYBERPUNK SYNTHWAVE TERMINAL */
        :root {
            --bg-main: #030305;
            --bg-card: #09090f;
            --neon-cyan: #00f0ff;    /* Ciano Elétrico */
            --neon-magenta: #ff007f; /* Magenta Neon */
            --text-muted: #6b7c96;
            --border-dim: rgba(0, 240, 255, 0.15);
            --font-mono: "Courier New", Courier, monospace;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-main);
            color: var(--neon-cyan);
            font-family: var(--font-mono);
            min-height: 100vh;
            padding: 4rem 2rem;
            display: flex;
            justify-content: center;
            position: relative;
            overflow-x: hidden;
        }

        /* EFEITO CRT SCANLINES */
        body::before {
            content: " ";
            display: block;
            position: fixed;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(#12101000 50%, #0000004d 50%), linear-gradient(90deg, #ff005508, #00f0ff05, rgba(0, 0, 255, 0.03));
            z-index: 9999;
            background-size: 100% 4px, 6px 100%;
            pointer-events: none;
        }

        .container {
            width: 100%;
            max-width: 1200px;
            z-index: 2;
        }

        /* Header Principal */
        .main-header {
            margin-bottom: 4rem;
            border: 1px solid var(--neon-magenta);
            border-left: 5px solid var(--neon-magenta);
            padding: 1.5rem;
            background: rgba(9, 9, 15, 0.8);
            box-shadow: 0 0 15px rgba(2ff, 0, 85, 0.1);
        }

        .sys-log {
            font-size: 0.8rem;
            color: var(--neon-magenta);
            margin-bottom: 1rem;
            text-shadow: 0 0 5px var(--neon-magenta);
        }

        .main-title {
            font-size: 2.5rem;
            font-weight: bold;
            text-transform: uppercase;
            margin-bottom: 0.5rem;
            color: #ffffff;
            text-shadow: 0 0 8px var(--neon-cyan), 0 0 20px rgba(0, 240, 255, 0.5);
        }

        .main-title::after {
            content: " _";
            color: var(--neon-magenta);
            animation: blink 0.8s infinite;
        }

        .main-subtitle {
            font-size: 0.95rem;
            color: var(--text-muted);
            line-height: 1.5;
        }

        /* Grid */
        .cards-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 1.5rem;
        }

        @media (max-width: 968px) {
            .cards-grid { grid-template-columns: repeat(2, 1fr); }
        }
        @media (max-width: 640px) {
            .cards-grid { grid-template-columns: 1fr; }
        }

        /* Card Component */
        .curso-card {
            background-color: var(--bg-card);
            border: 1px solid var(--border-dim);
            padding: 2rem;
            text-decoration: none;
            color: inherit;
            display: flex;
            flex-direction: column;
            position: relative;
            transition: all 0.25s cubic-bezier(0.16, 1, 0.3, 1);
        }

        /* Cantos HUD Estilo Mira (Múltiplas cores para contraste) */
        .curso-card::before, .curso-card::after {
            content: "";
            position: absolute;
            width: 12px; height: 12px;
            transition: all 0.25s ease;
        }

        /* Canto superior esquerdo */
        .curso-card::before {
            top: -1px; left: -1px;
            border-top: 2px solid var(--neon-cyan);
            border-left: 2px solid var(--neon-cyan);
        }

        /* Canto inferior direito */
        .curso-card::after {
            bottom: -1px; right: -1px;
            border-bottom: 2px solid var(--border-dim);
            border-right: 2px solid var(--border-dim);
        }

        .card-content {
            display: flex;
            flex-direction: column;
            height: 100%;
        }

        .card-id {
            font-size: 0.75rem;
            color: var(--text-muted);
            margin-bottom: 0.5rem;
            letter-spacing: 1px;
            transition: color 0.2s;
        }

        .card-title {
            font-size: 1.3rem;
            font-weight: bold;
            margin-bottom: 1rem;
            text-transform: uppercase;
            color: #ffffff;
            transition: all 0.2s;
        }

        .card-description {
            font-size: 0.85rem;
            line-height: 1.6;
            color: #a2b4c7;
            margin-bottom: 2.5rem;
        }

        .card-footer {
            margin-top: auto;
            display: flex;
            align-items: center;
            justify-content: space-between;
            font-size: 0.85rem;
            border-top: 1px dashed var(--border-dim);
            padding-top: 1rem;
            color: var(--neon-cyan);
            transition: all 0.2s;
        }

        .arrow-icon {
            transition: transform 0.25s ease;
        }

        /* HOVER INTERACTIONS: SOBRECARGA DE ENERGIA MAGENTA/CIANO */
        .curso-card:hover {
            border-color: var(--neon-magenta);
            background: rgba(255, 0, 85, 0.02);
            box-shadow: 0 0 20px rgba(0, 240, 255, 0.1), inset 0 0 10px rgba(255, 0, 85, 0.05);
            transform: translateY(-3px);
        }

        .curso-card:hover::before {
            border-color: var(--neon-magenta);
            box-shadow: 0 0 8px var(--neon-magenta);
        }

        .curso-card:hover::after {
            border-color: var(--neon-cyan);
            box-shadow: 0 0 8px var(--neon-cyan);
        }

        .curso-card:hover .card-id {
            color: var(--neon-cyan);
        }

        .curso-card:hover .card-title {
            color: var(--neon-cyan);
            text-shadow: 0 0 8px var(--neon-cyan);
        }

        .curso-card:hover .card-footer {
            border-top-color: var(--neon-magenta);
            color: var(--neon-magenta);
            text-shadow: 0 0 5px var(--neon-magenta);
        }

        .curso-card:hover .arrow-icon {
            transform: translateX(6px);
        }

        /* Cursor blinking logic */
        @keyframes blink {
            0%, 49% { opacity: 1; }
            50%, 100% { opacity: 0; }
        }
    </style>
</head>
<body>

    <div class="container">
        
        <header class="main-header">
            <div class="sys-log">NET_STATUS: SECURE // REPO_V2.0 // PALETTE: MAGENTA_CYAN</div>
            <h1 class="main-title">NET_DIRECTORY://MAIN_NODES</h1>
            <p class="main-subtitle">> Carregando partições de conhecimento. Selecione um dos blocos lógicos abaixo para descriptografar os arquivos locais de texto.</p>
        </header>

        <main class="cards-grid" id="grid-cursos">
            </main>

    </div>

    <script>
        const materias = [
            {
                id: 'NODE_01 // GUI_INTERFACE',
                title: '01.FRONTEND_DEV',
                description: 'Compilação de views em tempo de execução. Manipulação assíncrona de estados reativos, otimização crítica de layouts e estruturas de renderização DOM.',
                link: '#'
            },
            {
                id: 'NODE_02 // SYSTEM_CORE',
                title: '02.BACKEND_NETWORKS',
                description: 'Gerenciamento de fluxos de rede profundos. Protocolos HTTP/TCP, roteamento estruturado de pacotes, APIs criptografadas e persistência relacional.',
                link: '#'
            },
            {
                id: 'NODE_03 // LOGIC_MATRIX',
                title: '03.COMP_MATHEMATICS',
                description: 'Resolução lógica assintótica. Teoria dos grafos computacionais, matrizes aplicadas a processamento, álgebra booleana e estruturas discretas.',
                link: '#'
            }
        ];

        const gridContainer = document.getElementById('grid-cursos');

        gridContainer.innerHTML = materias.map(materia => `
            <a href="${materia.link}" class="curso-card">
                <div class="card-content">
                    <span class="card-id">${materia.id}</span>
                    <h2 class="card-title">${materia.title}</h2>
                    <p class="card-description">${materia.description}</p>
                    <div class="card-footer">
                        <span>[ EXEC_SECTOR ]</span>
                        <span class="arrow-icon">>></span>
                    </div>
                </div>
            </a>
        `).join('');
    </script>
</body>
</html>
